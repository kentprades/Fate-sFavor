<!DOCTYPE html>
<html>
<head>
  <title>Merge Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card profile-card">
      <div id="profile"></div>
      <div id="title"></div>
    </div>

    <div class="card game-card">
      <div id="game"></div>
      <button id="mergeBtn" onclick="merge()">🔥 Merge 🔥</button>
      <button onclick="logout()">Logout</button>
      <div id="cooldown"></div>
      <div id="highscore"></div>
    </div>
  </div>

  <script>
    let data = JSON.parse(localStorage.getItem("gameData"));
    if (!data.highscore) data.highscore = 0;
    if (!data.failCount) data.failCount = 0;

    function render() {
      document.getElementById("profile").innerHTML =
        `👤 ${data.username} | Lvl ${data.level} | EXP ${data.exp} | Points ${data.points}`;
      document.getElementById("game").innerHTML =
        `Current Points: ${data.points}`;
      document.getElementById("highscore").innerHTML =
        `🏆 High Score: ${data.highscore}`;
      document.getElementById("title").innerHTML = `🎖 Title: ${getTitle(data.level)}`;
    }

    function merge() {
      const btn = document.getElementById("mergeBtn");
      btn.disabled = true;
      let cooldown = 5;
      document.getElementById("cooldown").innerText = `Cooldown: ${cooldown}s`;

      const timer = setInterval(() => {
        cooldown--;
        document.getElementById("cooldown").innerText = `Cooldown: ${cooldown}s`;
        if (cooldown <= 0) {
          clearInterval(timer);
          btn.disabled = false;
          document.getElementById("cooldown").innerText = "";
        }
      }, 1000);

      if (Math.random() < 0.5) {
        // success
        data.points *= 2;
        data.exp += 50;
        data.failCount = 0;
        if (data.points > data.highscore) data.highscore = data.points;
        checkLevelUp();
      } else {
        // fail
        data.failCount++;
        if (data.failCount >= 2 && data.points > 1) {
          data.points /= 2;
          data.failCount = 0;
        }
      }
      render();
    }

    function checkLevelUp() {
      const needed = 100 + (data.level - 1) * 50;
      if (data.exp >= needed) {
        data.level++;
        data.exp = 0;
      }
    }

    function getTitle(level) {
      if (level >= 50) return "MAXED OUT";
      if (level >= 20) return "Lucky One";
      if (level >= 10) return "Patient Mind";
      return "Beginner";
    }

    function logout() {
      const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "key.json";
      a.click();
      localStorage.removeItem("gameData");
      window.location.href = "index.html";
    }

    render();
  </script>
</body>
</html>
