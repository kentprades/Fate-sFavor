<!DOCTYPE html>
<html>
<head>
  <title>Merge Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Profile card redirects to pfp.html -->
    <div class="card profile-card" onclick="goToPage('pfp.html')">
      <img id="pfp" src="" alt="Profile Picture" style="max-width:80px; border-radius:50%;">
      <div id="profile"></div>
      <div id="title"></div>
    </div>

    <div class="card game-card">
      <div id="game"></div>
      <button id="mergeBtn" onclick="merge()">🔁 Merge</button>
      <button onclick="logout()">🚪 Logout</button>
      <button id="rebirthBtn" onclick="rebirth()" style="display:none;">✨ Rebirth ✨</button>
      <button onclick="goToPage('shop.html')">🛒 Go to Shop</button>
      <div id="cooldown"></div>
      <div id="coins"></div>
      <div id="highscore"></div>
    </div>

    <div class="card active-card">
      <h3>Active Buffs</h3>
      <div id="activeItems"></div>
    </div>

    <div class="watermark">© SKPgamez</div>
  </div>

  <script>
    let data = JSON.parse(localStorage.getItem("gameData"));

    function saveData() {
      localStorage.setItem("gameData", JSON.stringify(data));
    }

    function goToPage(page) {
      saveData();
      window.location.href = page;
    }

    function render() {
      document.getElementById("profile").innerHTML =
        `👤 ${data.username} | Lvl ${data.level} | EXP ${data.exp} | Points ${data.points} | Rebirths: ${data.rebirths || 0}`;
      document.getElementById("game").innerHTML =
        `Current Points: ${data.points}`;
      document.getElementById("coins").innerHTML =
        `🪙 Coins: ${data.coins}`;
      document.getElementById("highscore").innerHTML =
        `🏆 High Score: ${data.highscore}`;
      document.getElementById("title").innerHTML =
        `🎖 Title: ${data.equippedTitle || "Beginner"}`;

      if (data.pfp) document.getElementById("pfp").src = data.pfp;

      document.getElementById("rebirthBtn").style.display =
        data.points >= 1000000 ? "inline-block" : "none";
    }

    function merge() {
      const btn = document.getElementById("mergeBtn");
      let cooldownTime = 5;
      if (data.activeItems.cooldown && Date.now() < data.activeItems.cooldown.end) {
        cooldownTime = 3;
      }

      btn.disabled = true;
      let cooldown = cooldownTime;
      document.getElementById("cooldown").innerText = `Cooldown: ${cooldown}s`;

      const timer = setInterval(() => {
        cooldown--;
        document.getElementById("cooldown").innerText = `Cooldown: ${cooldown}s`;
        if (cooldown <= 0) {
          clearInterval(timer);
          btn.disabled = false;
          document.getElementById("cooldown").innerText = "";
        }
      }, 1000);

      let successRate = 0.5;
      if (data.activeItems.success && Date.now() < data.activeItems.success.end) {
        successRate = 0.8;
      }

      if (Math.random() < successRate) {
        let gain = data.points;
        if (data.activeItems.multiplier && Date.now() < data.activeItems.multiplier.end) {
          gain *= 2;
        }
        data.points += gain;
        data.exp += 50;
        data.failCount = 0;
        if (data.points > data.highscore) data.highscore = data.points;
        checkLevelUp();
      } else {
        data.failCount++;
        data.coins += 1 + (data.rebirths || 0);
        if (data.failCount >= 2 && data.points > 1) {
          data.points = Math.max(1, Math.floor(data.points / 2)); // never below 1
          data.failCount = 0;
        }
      }
      saveData();
      render();
    }

    function checkLevelUp() {
      const needed = 100 + (data.level - 1) * 50;
      if (data.exp >= needed) {
        data.level++;
        data.exp = 0;
      }
    }

    function rebirth() {
      if (data.points >= 1000000) {
        data.points = 1; // reset to 1 point
        data.rebirths = (data.rebirths || 0) + 1;
        alert("Rebirth complete! You now have " + data.rebirths + " rebirth(s).");
        saveData();
        render();
      } else {
        alert("You need 1,000,000 points to rebirth!");
      }
    }

    function logout() {
      // Save everything into key.json
      const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "key.json";
      a.click();

      // Clear local storage and redirect
      localStorage.removeItem("gameData");
      window.location.href = "index.html";
    }

    // Buff countdown rendering
    function renderBuffs() {
      let active = "";
      for (let key in data.activeItems) {
        if (Date.now() < data.activeItems[key].end) {
          const remaining = Math.floor((data.activeItems[key].end - Date.now()) / 1000);
          active += `<p>${key} active — ${remaining}s left</p>`;
        }
      }
      document.getElementById("activeItems").innerHTML = active || "<p>No active buffs</p>";
    }

    // Update buffs every second
    setInterval(renderBuffs, 1000);

    render();
  </script>
</body>
</html>
